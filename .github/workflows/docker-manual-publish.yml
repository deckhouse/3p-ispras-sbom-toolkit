name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Optional override version (used if not a git tag)
        required: false

permissions:
  contents: read

concurrency:
  group: docker-publish-3p-ispras-sbom-checker
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx + QEMU для multi-arch
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/heads/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.WERF_REGISTRY }}/3p-ispras-sbom-checker
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=sha-${{ github.sha }}

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.WERF_REGISTRY }}
          username: ${{ secrets.WERF_USERNAME }}
          password: ${{ secrets.WERF_PASSWORD }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
